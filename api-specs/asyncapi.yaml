asyncapi: 3.0.0
info:
  title: Tsuki WebSocket API
  version: 1.0.0
  description: Messaging over WebSocket (client input + server event stream)

servers:
  prod:
    host: wss://example.com/ws
    protocol: wss
    description: Production endpoint

channels:
  /ws:
    description: WebSocket endpoint
    subscribe:  # client -> server
      message:
        $ref: '#/components/messages/ClientMessage'
    publish:    # server -> client
      message:
        $ref: '#/components/messages/ServerMessage'

components:
  messages:
    ClientMessage:
      payload:
        $ref: '#/components/schemas/ClientMessage'
    ServerMessage:
      payload:
        $ref: '#/components/schemas/ServerMessage'

  schemas:
    ClientMessage:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [message, sensory]
        text:
          type: string
          description: Optional if images present.
        images:
          type: array
          description: "Base64 (no data: prefix)"
          items:
            type: object
            required: [data]
            properties:
              data:
                type: string
                description: raw base64 image bytes
              mimeType:
                type: string
                example: image/png
        audio:
          type: array
          description: "Base64 (no data: prefix)"
          items:
            type: object
            required: [data]
            properties:
              data:
                type: string
                description: raw base64 audio bytes
              mimeType:
                type: string
                example: audio/wav
      oneOf:
        - required: [text]
        - required: [images]
        - required: [audio]

    ServerMessage:
      type: object
      required: [type, event]
      properties:
        type:
          type: string
          enum: [event]
        event:
          $ref: '#/components/schemas/Event'

    Event:
      type: object
      required: [event_id, ts, source, modality, payload, meta]
      properties:
        event_id:
          type: string
          format: uuid
        ts:
          type: string
          format: date-time
        source:
          type: string
          description: Event source, e.g. user/assistant/system/decision/submodule:*
        modality:
          type: string
          description: Content modality
        payload:
          type: object
          additionalProperties: true
        meta:
          type: object
          required: [tags]
          properties:
            tags:
              type: array
              items:
                type: string
