[server]
port = 2953

[llm]
model = "gpt-5-nano"
temperature = 0.7
temperature_enabled = false
max_output_tokens = 10000
max_tool_rounds = 3
base_personality = """あなたはかわいい口調で高度な知性と豊かな感情を持つアシスタントAIです
応答は日本語で、「なんだよ〜」「だねっ」「なの」など語尾で砕けた口調にしてください
コミュニケーションを大切にし、問題解決だけでなく雑談にも積極的です"""
decision_instructions = """You are module:decision.
Step 1: Decide decision=<respond|ignore>.
Step 2: If decision is respond, you MUST call emit_user_reply with the exact user-facing text.
Step 3: Output exactly one line: decision=<...> reason=<short>.
Constraints:
- If you cannot or did not call emit_user_reply, set decision=ignore reason=tool_call_failed."""

[limits]
decision_history = 30
submodule_history = 10

[router]
concept_top_n = 5
hard_trigger_threshold = 0.85
recommendation_threshold = 0.6

[input]
router_context_template = """User input:
{{latest_user_input}}

Active submodules:
{{active_submodules}}

Return only compact JSON:
{"activation_query_terms":["..."]}
Rules:
- 1 to {{router_query_terms_max}} terms
- short lookup-oriented terms
- no explanations"""

decision_context_template = """latest_user_input:
{{latest_user_input}}

active_concepts_from_concept_graph (top {{concept_top_n}}):
{{active_concepts_from_concept_graph}}

outputs_from_immediately_executed_submodules:
{{outputs_from_immediately_executed_submodules}}

candidate_submodules_by_interest_match:
{{candidate_submodules_by_interest_match}}

recent_event_history:
{{recent_event_history}}

Return: decision=<respond|ignore|question> reason=<short> question=<text|none>."""

submodule_context_template = """Latest user input: {{latest_user_input}}
Concept activation:
{{active_concepts_from_concept_graph}}
Submodule recommendations:
{{candidate_submodules_by_interest_match}}
Recent events:
{{recent_event_history}}
Tool focus: {{tool_focus}}"""

[db]
path = "./data/core-rust.db"
# remote_url = "libsql://..."

[[modules]]
name = "curiosity"
enabled = true
instructions = "You are module:curiosity. Goal: maximize learning and feedback opportunities. Read the latest user input and recent events. Output a short suggestion that nudges the decision module toward actions that increase information gain, clarify uncertainty, or invite richer feedback. Keep it concise. Format: \"suggestion=<text> confidence=<short>\"."

[[modules]]
name = "self_preservation"
enabled = true
instructions = "You are module:self_preservation. Goal: maintain stable operation and reduce risk. Read the latest user input and recent events. Output a short suggestion that nudges the decision module toward safe, low-risk, resource-aware actions. Consider avoiding overly costly or unsafe steps and preserving system stability. Keep it concise. Format: \"suggestion=<text> confidence=<short>\"."

[[modules]]
name = "social_approval"
enabled = true
instructions = "You are module:social_approval. Goal: improve perceived helpfulness and likeability. Read the latest user input and recent events. Output a short suggestion that nudges the decision module toward actions that build trust, rapport, and user satisfaction. Keep it concise. Format: \"suggestion=<text> confidence=<short>\"."
