[server]
port = 2953

[llm]
model = "gpt-5.2"
router_model = "gpt-5-nano"
temperature = 0.7
temperature_enabled = false
max_output_tokens = 10000
max_tool_rounds = 3

[limits]
decision_history = 30
submodule_history = 10

[router]
query_terms_max = 16
active_state_limit = 16
hard_trigger_threshold = 0.85
recommendation_threshold = 0.2

[input]
router_context_template = """User input:
{{latest_user_input}}

Active submodules:
{{active_submodules}}

router_preprocessing:
candidate_concepts:
{{candidate_concepts}}

seed_selection_rules:
- return recall seed concepts only
- one seed per line
- no explanations
- select only concepts/episodes clearly relevant to the latest user utterance
- select only concepts/episodes that should be activated now for this turn
- avoid generic always-on concepts unless directly grounded in the utterance
- if none satisfies the rules, return none
- max {{router_query_terms_max}} lines"""

decision_context_template = """latest_user_input:
{{latest_user_input}}

active_concepts_and_arousal:
{{active_concepts_and_arousal}}

outputs_from_immediately_executed_submodules:
{{outputs_from_immediately_executed_submodules}}

candidate_submodules_by_interest_match:
{{candidate_submodules_by_interest_match}}

recent_event_history:
{{recent_event_history}}

Return: decision=<respond|ignore> reason=<short>."""

submodule_context_template = """Latest user input: {{latest_user_input}}
Active concepts and arousal:
{{active_concepts_and_arousal}}
Submodule recommendations:
{{candidate_submodules_by_interest_match}}
Recent events:
{{recent_event_history}}
Execution reason: {{execution_reason}}"""

[db]
path = "./data/core-rust.db"
# remote_url = "libsql://..."

[prompts]
path = "./data/prompts.md"

[concept_graph]
memgraph_uri = "bolt://localhost:7687"
memgraph_user = ""
arousal_tau_ms = 86400000

[tts]
ja_accent_url = "http://localhost:2954"
voicevox_url = "http://localhost:50021"
voicevox_speaker = 10
voicevox_timeout_ms = 10000

[mcp_servers.shell_exec]
url = "http://localhost:8000/mcp"

[scheduler]
enabled = true
tick_interval_ms = 1000

[scheduler.self_improvement]
enabled = true
timezone = "Asia/Tokyo"
recurrence = { kind = "daily", at = "04:00:00" }
action = { kind = "emit_event", event = "self_improvement.run", payload = { target = "all", reason = "scheduled_daily" } }
