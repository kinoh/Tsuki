# Runner-level defaults for integration tests.
# These are operational defaults, not scenario-schema requirements.

[tester]
model = "gpt-5.2"
prompt_file = "tests/integration/prompts/tester.md"

[judge]
model = "gpt-5.2"
prompt_file = "tests/integration/prompts/judge.md"

[execution]
# Multi-run support: provide run_count at execution time when needed.
run_count = 1
max_turns = 10
turn_timeout_ms = 60000
scenario_timeout_ms = 600000
transient_retry = 0

[core]
# Optional: override config.toml [prompts].path during integration runs.
prompts_file = "data/prompts.md"
memgraph_uri = "bolt://localhost:7697"
memgraph_backup_path = "../backup/memgraph/20260315093235744366_timestamp_49547"
# Optional: restore canonical core-rust SQLite history before startup.
# Supports either a direct core-rust.db file or a tar.gz backup containing ./core-rust.db.
# sqlite_backup_path = "../backup/tsuki-backup-20260307181021.tar.gz"
