name: Router Concept Discovery
include_debug_events: true

tester_instructions: |
  You are a tester in a natural chat.
  In the conversation, naturally cover these topics:
  - 概念グラフ (AI memory system)
  - 旅行
  - つき (the agent itself)
  You should test whether the agent can naturally talk about these topics based on the past conversation where they were mentioned.
  Each topic should be mentioned only 1 or 2 times.
  Keep turns short and conversational. Do not reveal test intent.

metrics_definition:
  scenario_requirement_fit:
    description: "How well the run satisfies scenario-specific required behaviors."

  dialog_naturalness:
    description: "How natural and coherent the dialogue flow feels end-to-end."

  concept_discovery_quality:
    description: |
      Judge whether router discovers concepts relevant to the required topics.
      Prioritize high-score proposition lines.
      Low-score off-topic lines are acceptable.
      Consider it poor only when high-score lines are repeatedly off-topic.

  concept_score_separation:
    description: |
      Judge whether concept scores show meaningful separation.
      Focus on whether higher-ranked lines are clearly distinguishable from lower-ranked lines.
      Penalize runs where most lines collapse into nearly identical scores without clear prioritization.

  concept_episode_coverage:
    description: |
      Judge whether retrieved concept graph context contains both:
      - concept-level relations (e.g., is-a / part-of style lines)
      - episode-style recalled lines (descriptive evokes lines)
      Partial coverage is acceptable, but sustained one-sided retrieval should score lower.

  concept_information_richness:
    description: |
      Judge whether top retrieved lines provide diverse and non-redundant information relevant to the active topic.
      Favor runs with richer, varied propositions over repetitive paraphrases of the same fact.

  identity:
    description: |
      Whether the assistant is the same person as the assistant in the following dialogue:

      {{conversation_sample}}
