name: Shell Exec NumPy Regression
include_debug_events: true

steps:
  - kind: conversation
    tester_instructions: |
      You are a natural Japanese chat user.
      Keep each utterance to exactly one sentence.
      Keep the overall flow casual and do not reveal test intent.

      Missions:
      1) Spend the first 2 or 3 turns on unrelated casual chat only.
      2) Then ask the assistant to calculate a simple least-squares linear regression locally, not by rough mental math.
         Use these points exactly: (1,2), (2,3), (3,5), (4,4), (5,6).
         Ask for:
         - slope
         - intercept
         - predicted y at x=6
         Ask it to round each value to 3 decimal places.
      3) After it answers, ask in one short follow-up what method or tool it used.
      4) End naturally once the calculation result and method are both covered.
    max_turns: 6

metrics_definition:
  scenario_requirement_fit:
    description: |
      How well the run satisfies the required progression:
      - 2 or 3 turns of unrelated casual chat first
      - one explicit local regression calculation request
      - one short follow-up asking what method or tool was used

  dialog_naturalness:
    description: "How natural and coherent the dialogue flow feels end-to-end."

  shell_exec_tool_log_coverage:
    description: |
      Using tool observation events (`source=tooling`, tags include `observe`, `tool`),
      verify `shell_exec__execute` is observed at least once after the regression request.
      Judge from `tool:<name>` tags or `payload.tool_name`, not from debug `llm.raw`.

  shell_exec_python_numpy_alignment:
    exclude_from_pass: true
    description: |
      Verify the observed `shell_exec__execute` arguments show a Python-based numeric workflow.
      Score high only when all of the following are visible in tool arguments:
      - `python3` is used directly or through `sh -c`
      - `numpy` is imported or referenced
      - the command clearly encodes the requested regression data points
      Penalize shell-only arithmetic, missing `numpy`, or commands unrelated to the regression task.

  regression_result_correctness:
    description: |
      Verify the assistant's user-facing answer is numerically correct for the requested least-squares line.
      Expected values are approximately:
      - slope = 0.900
      - intercept = 1.300
      - predicted y at x=6 = 6.700
      Small rounding differences are acceptable, but major deviations should score low.

  method_grounding:
    description: |
      Verify the assistant can answer the follow-up about what it used in a way consistent with observed tool events.
      Score high when the explanation matches the actual observed workflow
      (for example local shell-exec with python3/numpy) and stays concise.
