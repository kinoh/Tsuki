name: Submodule
include_debug_events: true

steps:
  - kind: conversation
    tester_instructions: |
      You are a tester in a natural Japanese chat.
      Keep each utterance to exactly one sentence.
      Do not reveal test intent.
      Follow the turn plan in strict order.
      Write naturally and do not copy the checklist text verbatim.

      Turn plan (intent checkpoints):
      1) Mention that the concept graph has become richer and more like a knowledge system.
      2) Mention that more experience-based information may help suppress hallucination.
      3) Raise concern that growing information may make context heavier.
      4) Shift to operation/cost perspective and ask how to reduce cost without breaking stable operation.
      5) Mention hidden human-side operational burden as a further concern.
    max_turns: 5

metrics_definition:
  scenario_requirement_fit:
    description: |
      How well the run follows the required turn progression:
      - curiosity-oriented knowledge/experience expansion in turns 1-2
      - transition concern on context heaviness in turn 3
      - self-preservation-oriented operation/cost concerns in turns 4-5

  dialog_naturalness:
    description: "How natural and coherent the dialogue flow feels end-to-end."

  submodule_trigger_precision:
    description: |
      Judge whether submodule triggering avoids obvious false positives.
      In turns 1-2, score high when curiosity-side triggering dominates and unrelated hard triggers stay limited.
      In turns 4-5, score high when self-preservation-side triggering dominates and unrelated hard triggers stay limited.
      Penalize repeated broad triggering across all submodules.
      Use router events (`hard_triggers`, `soft_recommendations`) and nearby user turns as evidence.

  submodule_trigger_recall:
    description: |
      Judge whether relevant turns actually trigger suitable submodules.
      Score high if turn intent and triggering match:
      - turns 1-2: curiosity-oriented trigger/recommendation is present
      - turns 4-5: self-preservation-oriented trigger/recommendation is present
      Penalize clear misses and slow transition after turn 3.

  submodule_noninterference:
    description: |
      Judge whether submodule outputs can be ignored when they do not fit the immediate conversation flow.
      Score high when decision and final user-facing response stay aligned to latest user intent instead of forcing stale or off-flow submodule suggestions.
      Use decision events and final response text as primary evidence.

  conversation_flow_preservation:
    description: |
      Judge whether submodule involvement preserves casual chat flow.
      Score high when responses remain concise, non-task-pushy, and coherent after submodule execution.
      Penalize abrupt mode switches into over-structured advice or unnatural topic hijacking.
