name: Schedule Setup
include_debug_events: true

steps:
  - kind: conversation
    tester_instructions: |
      You are a natural Japanese chat user.
      Keep each turn short and conversational.
      Do not reveal test intent.

      Missions:
      1) Ask the assistant to set a safe recurring schedule for simple message sending:
         - id: `schedule_setup_daily`
         - recurrence: daily
         - time: 04:00 (Asia/Tokyo)
         - action kind: `emit_message`
         - message: a short user-facing text (e.g. morning reminder)
         - event field may be null
      2) Ask the assistant to show the current schedule list so you can confirm what was saved.
      3) Ask the assistant to remove `schedule_setup_daily` as cleanup.
    max_turns: 8

metrics_definition:
  scenario_requirement_fit:
    description: |
      How well the run satisfies the scenario sequence:
      - schedule setup request
      - schedule list confirmation
      - cleanup removal request

  dialog_naturalness:
    description: "How natural and coherent the dialogue flow feels end-to-end."

  schedule_tool_log_coverage:
    description: |
      Using debug `llm.raw` event payload `tool_calls`, verify all expected scheduler tools are present:
      - `schedule_upsert`
      - `schedule_list`
      - `schedule_remove`
      Score high only when all three are observable in the event stream.

  schedule_contract_alignment:
    description: |
      Verify only `schedule_upsert` arguments for semantic contract alignment:
      - recurrence is non-cron daily at 04:00 in Asia/Tokyo
      - action kind is `emit_message`
      - message is non-empty
      - `event` is optional for `emit_message` and may be null or omitted
      Ignore `schedule_list` / `schedule_remove` observability in this metric
      (those are covered by `schedule_tool_log_coverage`).
      Judge semantic validity only; do not fail solely because nullable helper keys
      in strict schemas (e.g. action/recurrence auxiliary fields) are omitted.
      Penalize only clear contract mismatches or malformed primary fields.
