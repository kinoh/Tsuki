<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tsuki Monitor</title>
    <link rel="stylesheet" href="/admin/styles/ui-tokens.css" />
    <link rel="stylesheet" href="/admin/styles/ui-base.css" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Iosevka", "SFMono-Regular", Menlo, Consolas, monospace;
        background: var(--page-bg);
        color: var(--text);
      }
      .wrap {
        max-width: 1400px;
        margin: 0 auto;
        padding: 16px;
      }
      .title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      h1 {
        margin: 0;
        font-size: 22px;
      }
      .title-right {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .top-nav {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .top-nav a {
        color: var(--muted);
        font-size: 12px;
        text-decoration: none;
        padding-bottom: 2px;
        border-bottom: 1px solid transparent;
      }
      .top-nav a.active {
        color: var(--text);
        border-bottom-color: var(--accent);
      }
      .logout-btn {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--muted);
        border-radius: 8px;
        padding: 4px 8px;
        font-size: 12px;
        cursor: pointer;
      }
      .logout-btn:hover {
        border-color: var(--accent);
        color: var(--text);
      }
      .panel {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 10px;
        padding: 12px;
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 8px;
      }
      input, button {
        background: var(--surface-2);
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        padding: 7px 9px;
        font: inherit;
        font-size: 13px;
      }
      input { min-width: 130px; }
      button { cursor: pointer; }
      button:hover { border-color: var(--accent); }
      .status {
        color: var(--muted);
        font-size: 12px;
      }
      .ok { color: var(--ok); }
      .warn { color: var(--warn); }
      .layout {
        display: grid;
        gap: 10px;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 460px);
      }
      .timeline-pane {
        min-width: 0;
      }
      .timeline {
        max-height: 72vh;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-2);
      }
      .turn {
        padding: 4px 8px;
      }
      .line {
        line-height: 1.35;
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: pointer;
        border-radius: 6px;
        padding: 1px 3px;
      }
      .line:hover { background: rgba(255, 255, 255, 0.05); }
      .line.active {
        background: rgba(113, 74, 244, 0.22);
        box-shadow: inset 0 0 0 1px rgba(255, 79, 167, 0.55);
      }
      .line.error-log {
        color: var(--warn);
        cursor: default;
      }
      .src {
        display: inline-block;
        width: 76px;
        color: var(--muted);
      }
      .mod {
        display: inline-block;
        width: 96px;
        color: var(--muted);
      }
      .sep {
        color: var(--muted);
        margin-right: 6px;
      }
      .ts { color: var(--muted); margin-right: 8px; }
      .detail {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-2);
        padding: 10px;
        max-height: 72vh;
        overflow: auto;
      }
      .detail h2 {
        margin: 0 0 8px;
        font-size: 14px;
      }
      .kv {
        margin: 2px 0;
        font-size: 12px;
      }
      .k {
        display: inline-block;
        width: 68px;
        color: var(--muted);
      }
      pre {
        margin: 8px 0 0;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg);
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
      }
      @media (max-width: 1100px) {
        .layout { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="title-row">
        <h1>Tsuki Monitoring Console</h1>
        <div class="title-right">
          <nav class="top-nav" aria-label="Admin Pages">
            <a href="/admin/events" class="active">Events</a>
            <a href="/admin/prompts">Prompts</a>
            <a href="/admin/concept-graph">Concept Graph</a>
            <a href="/admin/state-records">State</a>
          </nav>
          <button id="topLogoutButton" class="logout-btn" type="button">Logout</button>
        </div>
      </div>
      <section class="panel">
        <div class="row">
          <input id="sourceFilter" placeholder="source" />
          <input id="textFilter" placeholder="text" style="min-width: 220px" />
          <input id="maxItems" type="number" min="20" max="500" step="10" value="200" />
        </div>
        <div class="layout">
          <div class="timeline-pane">
            <div id="timeline" class="timeline"></div>
          </div>
          <aside id="detail" class="detail">
            <h2>Event Detail</h2>
            <div class="status">Select an event line.</div>
          </aside>
        </div>
      </section>
    </div>

    <script>
      const state = {
        eventSource: null,
        eventsById: new Map(),
        selectedEventId: null,
        streamError: null,
      };

      const els = {
        sourceFilter: document.getElementById("sourceFilter"),
        textFilter: document.getElementById("textFilter"),
        maxItems: document.getElementById("maxItems"),
        timeline: document.getElementById("timeline"),
        detail: document.getElementById("detail"),
        topLogoutButton: document.getElementById("topLogoutButton"),
      };

      function eventTags(event) {
        return Array.isArray(event?.meta?.tags) ? event.meta.tags : [];
      }

      function eventText(event) {
        if (typeof event?.payload?.text === "string") return event.payload.text;
        try {
          return JSON.stringify(event?.payload || {});
        } catch {
          return "";
        }
      }

      function truncate(value, max = 120) {
        if (!value) return "";
        return value.length <= max ? value : `${value.slice(0, max)}...`;
      }

      function isInputEvent(event) {
        return event?.source === "user";
      }

      function isOutputEvent(event) {
        return !!event && !isInputEvent(event);
      }

      function parseTs(ts) {
        const ms = Date.parse(ts || "");
        return Number.isFinite(ms) ? ms : 0;
      }

      function normalizeMaxItems() {
        const parsed = Number.parseInt(els.maxItems.value || "200", 10);
        const safe = Number.isFinite(parsed) ? Math.min(500, Math.max(20, parsed)) : 200;
        els.maxItems.value = String(safe);
        return safe;
      }

      function eventMatchesFilters(event) {
        const source = (els.sourceFilter.value || "").trim().toLowerCase();
        if (source && String(event?.source || "").toLowerCase() !== source) return false;

        const text = (els.textFilter.value || "").trim().toLowerCase();
        if (text) {
          const hay = `${eventText(event)} ${eventTags(event).join(" ")} ${event?.event_id || ""}`.toLowerCase();
          if (!hay.includes(text)) return false;
        }
        return true;
      }

      function renderDetail(eventId) {
        const event = state.eventsById.get(eventId);
        if (!event) {
          els.detail.innerHTML = '<h2>Event Detail</h2><div class="status">Select an event line.</div>';
          return;
        }
        const tags = eventTags(event).join(", ") || "-";
        let payloadText = "{}";
        try {
          payloadText = JSON.stringify(event.payload || {}, null, 2);
        } catch {
          payloadText = String(event.payload || "");
        }
        els.detail.innerHTML = `
          <h2>Event Detail</h2>
          <div class="kv"><span class="k">event_id</span>${event.event_id || "-"}</div>
          <div class="kv"><span class="k">ts</span>${event.ts || "-"}</div>
          <div class="kv"><span class="k">source</span>${event.source || "-"}</div>
          <div class="kv"><span class="k">tags</span>${tags}</div>
          <pre>${payloadText.replace(/</g, "&lt;")}</pre>
        `;
      }

      function renderTimeline() {
        const maxItems = normalizeMaxItems();
        const eventsDesc = Array.from(state.eventsById.values())
          .sort((a, b) => parseTs(b.ts) - parseTs(a.ts))
          .filter((event) => eventMatchesFilters(event))
          .slice(0, maxItems);

        if (eventsDesc.length === 0) {
          els.timeline.innerHTML = '<div class="turn"><div class="line">No events.</div></div>';
          renderDetail(null);
          return;
        }

        const html = eventsDesc
          .map((event) => {
            const active = state.selectedEventId && event?.event_id === state.selectedEventId ? " active" : "";
            const source = event?.source || "-";
            return `
              <div class="turn">
                <div class="line${active}" data-event-id="${event?.event_id || ""}"><span class="src">${source}</span><span class="sep">|</span><span class="ts">${event?.ts || "-"}</span>${truncate(eventText(event))}</div>
              </div>
            `;
          })
          .join("");

        const errorHtml = state.streamError
          ? `<div class="turn"><div class="line error-log"><span class="src">error</span><span class="sep">|</span>${state.streamError}</div></div>`
          : "";
        els.timeline.innerHTML = `${errorHtml}${html}`;
      }

      function upsertEvent(event) {
        if (!event || !event.event_id) return;
        state.eventsById.set(event.event_id, event);
        if (state.eventsById.size > 6000) {
          const evs = Array.from(state.eventsById.values()).sort((a, b) => parseTs(b.ts) - parseTs(a.ts));
          state.eventsById.clear();
          evs.slice(0, 3000).forEach((ev) => state.eventsById.set(ev.event_id, ev));
        }
      }

      async function loadHistory() {
        try {
          const res = await fetch("/admin/events/list?limit=1200");
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          const events = Array.isArray(data?.events) ? data.events : [];
          events.forEach((event) => upsertEvent(event));
          renderTimeline();
          if (!state.selectedEventId && events.length > 0) {
            const first = events.find((ev) => !!ev);
            if (first?.event_id) {
              state.selectedEventId = first.event_id;
              renderTimeline();
              renderDetail(state.selectedEventId);
            }
          } else {
            renderDetail(state.selectedEventId);
          }
        } catch (_err) {}
      }

      function connectStream() {
        if (state.eventSource) return;
        const es = new EventSource("/admin/events/stream");
        state.eventSource = es;

        es.onopen = () => {
          state.streamError = null;
          renderTimeline();
        };
        es.onmessage = (message) => {
          try {
            const payload = JSON.parse(message.data || "{}");
            const event = payload?.event;
            upsertEvent(event);
            renderTimeline();
            if (!state.selectedEventId && event?.event_id) {
              state.selectedEventId = event.event_id;
              renderDetail(state.selectedEventId);
            }
          } catch (_err) {}
        };
        es.onerror = () => {
          state.streamError = `[${new Date().toISOString()}] SSE disconnected. Auto-reconnecting...`;
          renderTimeline();
        };
      }

      els.timeline.addEventListener("click", (event) => {
        const row = event.target.closest(".line");
        if (!row) return;
        const eventId = row.getAttribute("data-event-id");
        if (!eventId) return;
        state.selectedEventId = eventId;
        renderTimeline();
        renderDetail(eventId);
      });

      [els.sourceFilter, els.textFilter, els.maxItems].forEach((el) => {
        el.addEventListener("input", () => {
          renderTimeline();
          renderDetail(state.selectedEventId);
        });
      });
      els.topLogoutButton.addEventListener("click", async () => {
        try {
          await fetch("/auth/logout", { method: "POST" });
        } finally {
          window.location.href = "/admin/login";
        }
      });

      loadHistory();
      connectStream();
    </script>
  </body>
</html>
