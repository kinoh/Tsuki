<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tsuki Monitor</title>
    <style>
      :root {
        --bg: #0d1720;
        --panel: #142331;
        --line: #2b4357;
        --text: #e6eff7;
        --muted: #9eb6c9;
        --ok: #83d19a;
        --warn: #efc36f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Iosevka", "SFMono-Regular", Menlo, Consolas, monospace;
        background: radial-gradient(circle at 20% -10%, #1e3448 0%, var(--bg) 60%);
        color: var(--text);
      }
      .wrap {
        max-width: 1400px;
        margin: 0 auto;
        padding: 16px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      .panel {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 10px;
        padding: 12px;
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 8px;
      }
      input, button {
        background: #102130;
        color: var(--text);
        border: 1px solid #355066;
        border-radius: 8px;
        padding: 7px 9px;
        font: inherit;
        font-size: 13px;
      }
      input { min-width: 130px; }
      button { cursor: pointer; }
      button:hover { border-color: #90cbff; }
      .status {
        color: var(--muted);
        font-size: 12px;
      }
      .ok { color: var(--ok); }
      .warn { color: var(--warn); }
      .layout {
        display: grid;
        gap: 10px;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 460px);
      }
      .timeline-pane {
        min-width: 0;
      }
      .timeline {
        max-height: 72vh;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(8, 15, 22, 0.6);
      }
      .turn {
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        padding: 8px 10px;
      }
      .turn:last-child { border-bottom: none; }
      .line {
        line-height: 1.5;
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: pointer;
        border-radius: 6px;
        padding: 2px 4px;
      }
      .line:hover { background: rgba(255, 255, 255, 0.05); }
      .line.active { background: rgba(109, 194, 255, 0.2); }
      .label {
        display: inline-block;
        width: 62px;
        color: var(--muted);
      }
      .issuer {
        color: var(--muted);
        margin-right: 8px;
      }
      .ts { color: var(--muted); margin-right: 8px; }
      .detail {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(8, 15, 22, 0.6);
        padding: 10px;
        max-height: 72vh;
        overflow: auto;
      }
      .detail h2 {
        margin: 0 0 8px;
        font-size: 14px;
      }
      .kv {
        margin: 2px 0;
        font-size: 12px;
      }
      .k {
        display: inline-block;
        width: 68px;
        color: var(--muted);
      }
      pre {
        margin: 8px 0 0;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.25);
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
      }
      @media (max-width: 1100px) {
        .layout { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Tsuki Monitoring Console</h1>
      <section class="panel">
        <div class="row">
          <button id="connect">Connect</button>
          <button id="disconnect">Disconnect</button>
          <button id="refresh">Reload History</button>
          <span id="streamStatus" class="status">Disconnected</span>
        </div>
        <div class="row">
          <input id="sourceFilter" placeholder="source" />
          <input id="moduleFilter" placeholder="module" />
          <input id="textFilter" placeholder="text" style="min-width: 220px" />
          <input id="maxItems" type="number" min="20" max="500" step="10" value="200" />
        </div>
        <div class="layout">
          <div class="timeline-pane">
            <div id="timeline" class="timeline"></div>
          </div>
          <aside id="detail" class="detail">
            <h2>Event Detail</h2>
            <div class="status">Select an input/output line.</div>
          </aside>
        </div>
      </section>
    </div>

    <script>
      const state = {
        eventSource: null,
        eventsById: new Map(),
        selectedEventId: null,
      };

      const els = {
        connect: document.getElementById("connect"),
        disconnect: document.getElementById("disconnect"),
        refresh: document.getElementById("refresh"),
        streamStatus: document.getElementById("streamStatus"),
        sourceFilter: document.getElementById("sourceFilter"),
        moduleFilter: document.getElementById("moduleFilter"),
        textFilter: document.getElementById("textFilter"),
        maxItems: document.getElementById("maxItems"),
        timeline: document.getElementById("timeline"),
        detail: document.getElementById("detail"),
      };

      function setStreamStatus(text, level = "status") {
        els.streamStatus.className = level;
        els.streamStatus.textContent = text;
      }

      function eventTags(event) {
        return Array.isArray(event?.meta?.tags) ? event.meta.tags : [];
      }

      function eventModule(event) {
        const payloadModule = event?.payload?.module;
        if (typeof payloadModule === "string" && payloadModule.trim()) {
          return payloadModule.trim();
        }
        const fromTag = eventTags(event).find((tag) => tag.startsWith("module:"));
        return fromTag ? fromTag.slice("module:".length) : "";
      }

      function eventText(event) {
        if (typeof event?.payload?.text === "string") return event.payload.text;
        try {
          return JSON.stringify(event?.payload || {});
        } catch {
          return "";
        }
      }

      function truncate(value, max = 120) {
        if (!value) return "";
        return value.length <= max ? value : `${value.slice(0, max)}...`;
      }

      function isInputEvent(event) {
        return event?.source === "user";
      }

      function isOutputEvent(event) {
        const tags = eventTags(event);
        return (tags.includes("action") && tags.includes("response")) || event?.source === "assistant";
      }

      function parseTs(ts) {
        const ms = Date.parse(ts || "");
        return Number.isFinite(ms) ? ms : 0;
      }

      function normalizeMaxItems() {
        const parsed = Number.parseInt(els.maxItems.value || "200", 10);
        const safe = Number.isFinite(parsed) ? Math.min(500, Math.max(20, parsed)) : 200;
        els.maxItems.value = String(safe);
        return safe;
      }

      function eventMatchesFilters(event) {
        const source = (els.sourceFilter.value || "").trim().toLowerCase();
        if (source && String(event?.source || "").toLowerCase() !== source) return false;

        const moduleFilter = (els.moduleFilter.value || "").trim().toLowerCase();
        if (moduleFilter && eventModule(event).toLowerCase() !== moduleFilter) return false;

        const text = (els.textFilter.value || "").trim().toLowerCase();
        if (text) {
          const hay = `${eventText(event)} ${eventTags(event).join(" ")} ${event?.event_id || ""}`.toLowerCase();
          if (!hay.includes(text)) return false;
        }
        return true;
      }

      function buildTurnsFromEvents(eventsDesc) {
        const relevantDesc = eventsDesc.filter((event) => isInputEvent(event) || isOutputEvent(event));
        if (relevantDesc.length === 0) return [];

        const eventsAsc = relevantDesc.slice().reverse();
        const turns = [];
        let current = null;

        eventsAsc.forEach((event) => {
          if (isInputEvent(event)) {
            if (current) turns.push(current);
            current = { input: event, output: null };
            return;
          }
          if (!current) return;
          if (isOutputEvent(event) && !current.output) current.output = event;
        });

        if (current) turns.push(current);
        const desc = turns.reverse();
        return desc.sort((a, b) => {
          const aLatest = Math.max(parseTs(a.input?.ts), parseTs(a.output?.ts));
          const bLatest = Math.max(parseTs(b.input?.ts), parseTs(b.output?.ts));
          return bLatest - aLatest;
        });
      }

      function renderDetail(eventId) {
        const event = state.eventsById.get(eventId);
        if (!event) {
          els.detail.innerHTML = '<h2>Event Detail</h2><div class="status">Select an input/output line.</div>';
          return;
        }
        const tags = eventTags(event).join(", ") || "-";
        const moduleName = eventModule(event) || "-";
        let payloadText = "{}";
        try {
          payloadText = JSON.stringify(event.payload || {}, null, 2);
        } catch {
          payloadText = String(event.payload || "");
        }
        els.detail.innerHTML = `
          <h2>Event Detail</h2>
          <div class="kv"><span class="k">event_id</span>${event.event_id || "-"}</div>
          <div class="kv"><span class="k">ts</span>${event.ts || "-"}</div>
          <div class="kv"><span class="k">source</span>${event.source || "-"}</div>
          <div class="kv"><span class="k">module</span>${moduleName}</div>
          <div class="kv"><span class="k">tags</span>${tags}</div>
          <pre>${payloadText.replace(/</g, "&lt;")}</pre>
        `;
      }

      function renderTimeline() {
        const maxItems = normalizeMaxItems();
        const eventsDesc = Array.from(state.eventsById.values()).sort((a, b) => parseTs(b.ts) - parseTs(a.ts));
        const turns = buildTurnsFromEvents(eventsDesc)
          .filter((turn) => {
            const inOk = turn.input ? eventMatchesFilters(turn.input) : false;
            const outOk = turn.output ? eventMatchesFilters(turn.output) : false;
            return inOk || outOk;
          })
          .slice(0, maxItems);

        if (turns.length === 0) {
          els.timeline.innerHTML = '<div class="turn"><div class="line">No input/output pairs.</div></div>';
          renderDetail(null);
          return;
        }

        const html = turns
          .map((turn) => {
            const input = turn.input;
            const output = turn.output;
            const inActive = state.selectedEventId && input?.event_id === state.selectedEventId ? " active" : "";
            const outActive = state.selectedEventId && output?.event_id === state.selectedEventId ? " active" : "";
            const inputIssuer = input?.source || "-";
            const outputIssuer = output?.source || "-";
            return `
              <div class="turn">
                <div class="line${inActive}" data-event-id="${input?.event_id || ""}"><span class="label">input</span><span class="issuer">[${inputIssuer}]</span><span class="ts">${input?.ts || "-"}</span>${truncate(eventText(input))}</div>
                <div class="line${outActive}" data-event-id="${output?.event_id || ""}"><span class="label">output</span><span class="issuer">[${outputIssuer}]</span><span class="ts">${output?.ts || "-"}</span>${truncate(output ? eventText(output) : "(none)")}</div>
              </div>
            `;
          })
          .join("");

        els.timeline.innerHTML = html;
      }

      function upsertEvent(event) {
        if (!event || !event.event_id) return;
        state.eventsById.set(event.event_id, event);
        if (state.eventsById.size > 6000) {
          const evs = Array.from(state.eventsById.values()).sort((a, b) => parseTs(b.ts) - parseTs(a.ts));
          state.eventsById.clear();
          evs.slice(0, 3000).forEach((ev) => state.eventsById.set(ev.event_id, ev));
        }
      }

      async function loadHistory() {
        setStreamStatus("Loading history...", "status");
        try {
          const res = await fetch("/debug/events?limit=1200");
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          const events = Array.isArray(data?.events) ? data.events : [];
          events.forEach((event) => upsertEvent(event));
          renderTimeline();
          if (!state.selectedEventId && events.length > 0) {
            const first = events.find((ev) => isInputEvent(ev) || isOutputEvent(ev));
            if (first?.event_id) {
              state.selectedEventId = first.event_id;
              renderTimeline();
              renderDetail(state.selectedEventId);
            }
          } else {
            renderDetail(state.selectedEventId);
          }
          setStreamStatus(state.eventSource ? "Connected" : "History loaded", state.eventSource ? "ok" : "status");
        } catch (err) {
          setStreamStatus(`History error: ${err}`, "warn");
        }
      }

      function disconnectStream() {
        if (state.eventSource) {
          state.eventSource.close();
          state.eventSource = null;
        }
        setStreamStatus("Disconnected", "status");
      }

      function connectStream() {
        if (state.eventSource) return;
        setStreamStatus("Connecting...", "status");
        const es = new EventSource("/debug/events/stream");
        state.eventSource = es;

        es.onopen = () => setStreamStatus("Connected", "ok");
        es.onmessage = (message) => {
          try {
            const payload = JSON.parse(message.data || "{}");
            const event = payload?.event;
            upsertEvent(event);
            renderTimeline();
            if (!state.selectedEventId && event?.event_id) {
              state.selectedEventId = event.event_id;
              renderDetail(state.selectedEventId);
            }
          } catch (_err) {
            setStreamStatus("Malformed event received", "warn");
          }
        };
        es.onerror = () => setStreamStatus("Reconnecting...", "warn");
      }

      els.timeline.addEventListener("click", (event) => {
        const row = event.target.closest(".line");
        if (!row) return;
        const eventId = row.getAttribute("data-event-id");
        if (!eventId) return;
        state.selectedEventId = eventId;
        renderTimeline();
        renderDetail(eventId);
      });

      els.connect.addEventListener("click", connectStream);
      els.disconnect.addEventListener("click", disconnectStream);
      els.refresh.addEventListener("click", loadHistory);
      [els.sourceFilter, els.moduleFilter, els.textFilter, els.maxItems].forEach((el) => {
        el.addEventListener("input", () => {
          renderTimeline();
          renderDetail(state.selectedEventId);
        });
      });

      window.addEventListener("beforeunload", disconnectStream);

      loadHistory();
      connectStream();
    </script>
  </body>
</html>
