<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tsuki Admin Login</title>
    <style>
      :root {
        --bg: #0f1115;
        --surface: #171a21;
        --surface-2: #1c2029;
        --text: #e8ecf2;
        --muted: #9aa4b2;
        --accent: #ff4fa7;
        --accent-2: #714af4;
        --success: #83d19a;
        --danger: #d46b6b;
        --line: rgba(255, 255, 255, 0.08);
        --line-strong: rgba(255, 255, 255, 0.18);
        --radius: 10px;
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
        --page-bg: radial-gradient(circle at top left, #1c2029 0%, #0f1115 60%);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", "IBM Plex Sans", "Avenir Next", sans-serif;
        background: var(--page-bg);
        color: var(--text);
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .panel {
        width: min(92vw, 480px);
        border-radius: var(--radius);
        padding: 22px;
        border: 1px solid var(--line);
        background: var(--surface);
        box-shadow: var(--shadow);
      }
      .title {
        margin: 0;
        font-size: 20px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      p {
        margin: 8px 0 18px;
        color: var(--muted);
        font-size: 13px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: var(--muted);
      }
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        background: var(--surface-2);
        color: var(--text);
        font: inherit;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(255, 79, 167, 0.2);
      }
      button {
        width: 100%;
        margin-top: 14px;
        border: 1px solid var(--line-strong);
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        color: var(--text);
        background: var(--surface-2);
      }
      button:hover {
        border-color: var(--accent);
      }
      button:disabled {
        opacity: 0.7;
        cursor: default;
      }
      .status {
        min-height: 20px;
        margin-top: 10px;
        font-size: 13px;
        color: var(--muted);
      }
      .status.error { color: var(--danger); }
      .status.ok { color: var(--success); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <main class="panel">
        <h1 class="title">Tsuki Admin</h1>
        <p>Enter ADMIN_AUTH_PASSWORD to continue.</p>
        <form id="loginForm">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password" />
          <button id="submit" type="submit">Sign In</button>
        </form>
        <div id="status" class="status"></div>
      </main>
    </div>
    <script>
      const form = document.getElementById("loginForm");
      const passwordInput = document.getElementById("password");
      const submitButton = document.getElementById("submit");
      const statusEl = document.getElementById("status");

      function setStatus(text, kind) {
        statusEl.textContent = text || "";
        statusEl.classList.remove("error", "ok");
        if (kind) statusEl.classList.add(kind);
      }

      async function checkSession() {
        try {
          const res = await fetch("/auth/me");
          if (res.ok) {
            window.location.href = "/admin/ui";
          }
        } catch (_) {}
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const password = passwordInput.value.trim();
        if (!password) {
          setStatus("Password is required.", "error");
          return;
        }
        submitButton.disabled = true;
        setStatus("Signing in...");
        try {
          const res = await fetch("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password }),
          });
          if (!res.ok) {
            setStatus("Login failed. Check your password.", "error");
            return;
          }
          setStatus("Signed in. Redirecting...", "ok");
          window.location.href = "/admin/ui";
        } catch (error) {
          setStatus(`Login error: ${error?.message || error}`, "error");
        } finally {
          submitButton.disabled = false;
        }
      });

      checkSession();
      passwordInput.focus();
    </script>
  </body>
</html>
