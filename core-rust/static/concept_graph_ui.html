<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Concept Graph Debug</title>
    <link rel="stylesheet" href="/admin/styles/ui-tokens.css" />
    <link rel="stylesheet" href="/admin/styles/ui-base.css" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--page-bg);
        color: var(--text);
        font-family: "IBM Plex Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      }

      .page {
        max-width: 1280px;
        margin: 0 auto;
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      .row { display: grid; gap: 12px; }
      .row.top { grid-template-columns: 1fr 1fr; }
      .row.main { grid-template-columns: 380px 1fr; }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
      }

      .title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 6px;
      }
      h1 { margin: 0; font-size: 20px; }
      .title-right {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .top-nav {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .top-nav a {
        color: var(--muted);
        font-size: 12px;
        text-decoration: none;
        padding-bottom: 2px;
        border-bottom: 1px solid transparent;
      }
      .top-nav a.active {
        color: var(--text);
        border-bottom-color: var(--accent);
      }
      .logout-btn {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--muted);
        border-radius: 8px;
        padding: 4px 8px;
        font-size: 12px;
        cursor: pointer;
      }
      .logout-btn:hover {
        border-color: var(--accent);
        color: var(--text);
      }
      h2 { margin: 0 0 8px; font-size: 15px; }
      .muted { color: var(--muted); font-size: 12px; }

      .status-ok { color: var(--accent); font-weight: 700; }
      .status-ng { color: var(--danger); font-weight: 700; }

      .grid3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }

      .metric-btn {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
        text-align: left;
        background: var(--surface-2);
        cursor: pointer;
      }

      .metric-btn.active {
        border-color: var(--accent);
        background: rgba(113, 74, 244, 0.22);
      }

      .metric-btn .name { font-size: 12px; color: var(--muted); }
      .metric-btn .value { font-size: 18px; font-weight: 700; margin-top: 4px; }

      .toolbar { display: flex; gap: 8px; margin-bottom: 8px; }

      input, button {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
        font: inherit;
      }

      input { flex: 1; }
      button { cursor: pointer; background: var(--surface-2); }
      button:hover { border-color: var(--accent); }

      .list {
        border: 1px solid var(--line);
        border-radius: 8px;
        max-height: 480px;
        overflow: auto;
      }

      .item {
        padding: 10px;
        border-bottom: 1px solid var(--line);
        cursor: pointer;
      }

      .item:last-child { border-bottom: 0; }
      .item:hover { background: rgba(255, 255, 255, 0.05); }
      .item.active { background: rgba(113, 74, 244, 0.22); }
      .item .name { font-weight: 700; }
      .item .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }

      .kv { display: grid; grid-template-columns: 180px 1fr; gap: 6px; font-size: 13px; margin-bottom: 4px; }
      .k { color: var(--muted); }

      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { border: 1px solid var(--line); text-align: left; padding: 6px; }
      th { background: var(--surface-2); }

      .timeline {
        border: 1px solid var(--line);
        border-radius: 8px;
        max-height: 280px;
        overflow: auto;
      }

      .timeline-item {
        border-bottom: 1px solid var(--line);
        padding: 10px;
        font-size: 13px;
      }

      .timeline-item:last-child { border-bottom: 0; }
      .timeline-meta { font-size: 12px; color: var(--muted); margin-bottom: 4px; }

      @media (max-width: 980px) {
        .row.top, .row.main { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="card">
        <div class="title-row">
          <h1>Concept Graph Debug</h1>
          <div class="title-right">
            <nav class="top-nav" aria-label="Admin Pages">
              <a href="/admin/events">Events</a>
              <a href="/admin/prompts">Prompts</a>
              <a href="/admin/concept-graph" class="active">Concept Graph</a>
            </nav>
            <button id="topLogoutButton" class="logout-btn" type="button">Logout</button>
          </div>
        </div>
        <div class="muted">Read-only monitor for graph health, entity exploration, and router query history.</div>
      </div>

      <section class="row top">
        <div class="card">
          <h2>Health</h2>
          <div id="healthStatus" class="muted">Loading...</div>
          <div id="healthMeta" class="muted"></div>
        </div>
        <div class="card">
          <h2>Entities (click to switch list/search target)</h2>
          <div class="grid3">
            <button id="tabConcept" class="metric-btn active" type="button"><div class="name">Concepts</div><div class="value" id="conceptCount">-</div></button>
            <button id="tabEpisode" class="metric-btn" type="button"><div class="name">Episodes</div><div class="value" id="episodeCount">-</div></button>
            <button id="tabRelation" class="metric-btn" type="button"><div class="name">Relations</div><div class="value" id="relationCount">-</div></button>
          </div>
        </div>
      </section>

      <section class="row main">
        <div class="card">
          <h2 id="searchTitle">Concept Search</h2>
          <div class="toolbar">
            <input id="searchInput" placeholder="Search concept name" />
            <button id="searchBtn">Search</button>
          </div>
          <div id="searchList" class="list"></div>
        </div>

        <div class="card">
          <h2 id="detailTitle">Concept Detail</h2>
          <div id="detailBody" class="muted">Select an item from search results.</div>
        </div>
      </section>

      <section class="card">
        <h2>Concept Query Timeline</h2>
        <div class="toolbar">
          <button id="refreshTimelineBtn">Refresh</button>
        </div>
        <div id="timeline" class="timeline"></div>
      </section>
    </main>

    <script>
      const MODE_CONCEPT = "concept";
      const MODE_EPISODE = "episode";
      const MODE_RELATION = "relation";

      const state = {
        mode: MODE_CONCEPT,
        selectedKey: null,
      };

      const els = {
        healthStatus: document.getElementById("healthStatus"),
        healthMeta: document.getElementById("healthMeta"),
        conceptCount: document.getElementById("conceptCount"),
        episodeCount: document.getElementById("episodeCount"),
        relationCount: document.getElementById("relationCount"),
        tabConcept: document.getElementById("tabConcept"),
        tabEpisode: document.getElementById("tabEpisode"),
        tabRelation: document.getElementById("tabRelation"),
        searchTitle: document.getElementById("searchTitle"),
        detailTitle: document.getElementById("detailTitle"),
        searchInput: document.getElementById("searchInput"),
        searchBtn: document.getElementById("searchBtn"),
        searchList: document.getElementById("searchList"),
        detailBody: document.getElementById("detailBody"),
        refreshTimelineBtn: document.getElementById("refreshTimelineBtn"),
        timeline: document.getElementById("timeline"),
        topLogoutButton: document.getElementById("topLogoutButton"),
      };

      async function requestJson(path) {
        const res = await fetch(path);
        if (!res.ok) {
          let message = `${res.status} ${res.statusText}`;
          try { message = await res.text(); } catch (_) {}
          throw new Error(message);
        }
        return res.json();
      }

      function formatMs(ms) {
        if (!Number.isFinite(ms) || ms <= 0) return "-";
        return new Date(ms).toISOString();
      }

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function modeConfig(mode) {
        if (mode === MODE_EPISODE) {
          return {
            searchTitle: "Episode Search",
            detailTitle: "Episode Detail",
            placeholder: "Search episode id or summary",
            searchPath: (q) => q
              ? `/admin/concept-graph/episodes?q=${encodeURIComponent(q)}&limit=80`
              : "/admin/concept-graph/episodes?limit=80",
            detailPath: (name) => `/admin/concept-graph/episodes/${encodeURIComponent(name)}`,
          };
        }
        if (mode === MODE_RELATION) {
          return {
            searchTitle: "Relation Search",
            detailTitle: "Relation Detail",
            placeholder: "Search by from / type / to",
            searchPath: (q) => q
              ? `/admin/concept-graph/relations?q=${encodeURIComponent(q)}&limit=120`
              : "/admin/concept-graph/relations?limit=120",
            detailPath: null,
          };
        }
        return {
          searchTitle: "Concept Search",
          detailTitle: "Concept Detail",
          placeholder: "Search concept name",
          searchPath: (q) => q
            ? `/admin/concept-graph/concepts?q=${encodeURIComponent(q)}&limit=80`
            : "/admin/concept-graph/concepts?limit=80",
          detailPath: (name) => `/admin/concept-graph/concepts/${encodeURIComponent(name)}`,
        };
      }

      function setMode(mode) {
        state.mode = mode;
        state.selectedKey = null;
        const cfg = modeConfig(mode);
        els.searchTitle.textContent = cfg.searchTitle;
        els.detailTitle.textContent = cfg.detailTitle;
        els.searchInput.placeholder = cfg.placeholder;
        els.detailBody.innerHTML = '<div class="muted">Select an item from search results.</div>';
        els.tabConcept.classList.toggle("active", mode === MODE_CONCEPT);
        els.tabEpisode.classList.toggle("active", mode === MODE_EPISODE);
        els.tabRelation.classList.toggle("active", mode === MODE_RELATION);
      }

      async function loadHealth() {
        try {
          const health = await requestJson("/admin/concept-graph/health");
          const connected = !!health.connected;
          els.healthStatus.innerHTML = connected
            ? '<span class="status-ok">Connected</span>'
            : '<span class="status-ng">Disconnected</span>';
          const error = health.error ? `error=${health.error}` : "";
          els.healthMeta.textContent = `checked_at=${formatMs(Number(health.checked_at_ms))} tau_ms=${health.arousal_tau_ms ?? "-"} ${error}`.trim();
        } catch (error) {
          els.healthStatus.innerHTML = '<span class="status-ng">Health fetch failed</span>';
          els.healthMeta.textContent = String(error.message || error);
        }
      }

      async function loadCounts() {
        try {
          const stats = await requestJson("/admin/concept-graph/stats");
          els.conceptCount.textContent = String(stats.concept_count ?? "-");
          els.episodeCount.textContent = String(stats.episode_count ?? "-");
          els.relationCount.textContent = String(stats.relation_count ?? "-");
        } catch (_) {
          els.conceptCount.textContent = "ERR";
          els.episodeCount.textContent = "ERR";
          els.relationCount.textContent = "ERR";
        }
      }

      function itemKey(item) {
        if (!item) return "";
        if (state.mode === MODE_RELATION) {
          return `${item.from || ""}|${item.type || ""}|${item.to || ""}`;
        }
        return item.name || "";
      }

      function renderSearchList(items) {
        if (!Array.isArray(items) || items.length === 0) {
          els.searchList.innerHTML = '<div class="item"><div class="meta">No data.</div></div>';
          return;
        }
        els.searchList.innerHTML = items
          .map((item) => {
            const key = itemKey(item);
            const active = state.selectedKey === key ? " active" : "";
            let title = "";
            let meta = "";
            if (state.mode === MODE_EPISODE) {
              title = item.name || "";
              meta = `summary=${item.summary || "-"} valence=${item.valence ?? "-"} arousal=${item.arousal ?? "-"}`;
            } else if (state.mode === MODE_RELATION) {
              title = `${item.from || "-"} ${item.type || "-"} ${item.to || "-"}`;
              meta = `weight=${item.weight ?? "-"}`;
            } else {
              title = item.name || "";
              meta = `valence=${item.valence ?? "-"} arousal=${item.arousal ?? "-"}`;
            }
            return `
              <div class="item${active}" data-item-key="${escapeHtml(key)}" data-item-json="${escapeHtml(JSON.stringify(item))}">
                <div class="name">${escapeHtml(title)}</div>
                <div class="meta">${escapeHtml(meta)}</div>
              </div>
            `;
          })
          .join("");
      }

      async function loadSearch() {
        const q = (els.searchInput.value || "").trim();
        const cfg = modeConfig(state.mode);
        const data = await requestJson(cfg.searchPath(q));
        renderSearchList(data.items || []);
      }

      function renderConceptDetail(concept) {
        if (!concept || !concept.name) {
          els.detailBody.innerHTML = '<div class="muted">Select a concept from search results.</div>';
          return;
        }
        const relations = Array.isArray(concept.relations) ? concept.relations : [];
        const episodes = Array.isArray(concept.episodes) ? concept.episodes : [];
        const relationRows = relations.length
          ? relations.map((rel) => `<tr><td>${escapeHtml(rel.direction)}</td><td>${escapeHtml(rel.from)}</td><td>${escapeHtml(rel.type)}</td><td>${escapeHtml(rel.to)}</td><td>${rel.weight ?? "-"}</td></tr>`).join("")
          : '<tr><td colspan="5">No relations</td></tr>';
        const episodeRows = episodes.length
          ? episodes.map((ep) => `<tr><td>${escapeHtml(ep.summary)}</td><td>${ep.valence ?? "-"}</td></tr>`).join("")
          : '<tr><td colspan="2">No episodes</td></tr>';
        els.detailBody.innerHTML = `
          <div class="kv"><div class="k">name</div><div>${escapeHtml(concept.name)}</div></div>
          <div class="kv"><div class="k">valence</div><div>${concept.valence ?? "-"}</div></div>
          <div class="kv"><div class="k">arousal</div><div>${concept.arousal ?? "-"}</div></div>
          <div class="kv"><div class="k">arousal_level</div><div>${concept.arousal_level ?? "-"}</div></div>
          <div class="kv"><div class="k">accessed_at</div><div>${formatMs(Number(concept.accessed_at))}</div></div>
          <h2 style="margin-top:12px;">Relations</h2>
          <table><thead><tr><th>direction</th><th>from</th><th>type</th><th>to</th><th>weight</th></tr></thead><tbody>${relationRows}</tbody></table>
          <h2 style="margin-top:12px;">Episodes</h2>
          <table><thead><tr><th>summary</th><th>valence</th></tr></thead><tbody>${episodeRows}</tbody></table>
        `;
      }

      function renderEpisodeDetail(episode) {
        if (!episode || !episode.name) {
          els.detailBody.innerHTML = '<div class="muted">Select an episode from search results.</div>';
          return;
        }
        const linked = Array.isArray(episode.linked_concepts) ? episode.linked_concepts : [];
        const linkedRows = linked.length
          ? linked.map((item) => `<tr><td>${escapeHtml(item.concept)}</td><td>${item.weight ?? "-"}</td></tr>`).join("")
          : '<tr><td colspan="2">No linked concepts</td></tr>';
        els.detailBody.innerHTML = `
          <div class="kv"><div class="k">episode id</div><div>${escapeHtml(episode.name)}</div></div>
          <div class="kv"><div class="k">valence</div><div>${episode.valence ?? "-"}</div></div>
          <div class="kv"><div class="k">arousal</div><div>${episode.arousal ?? "-"}</div></div>
          <div class="kv"><div class="k">arousal_level</div><div>${episode.arousal_level ?? "-"}</div></div>
          <div class="kv"><div class="k">accessed_at</div><div>${formatMs(Number(episode.accessed_at))}</div></div>
          <h2 style="margin-top:12px;">Linked Concepts</h2>
          <table><thead><tr><th>concept</th><th>weight</th></tr></thead><tbody>${linkedRows}</tbody></table>
        `;
      }

      function renderRelationDetail(relation) {
        if (!relation) {
          els.detailBody.innerHTML = '<div class="muted">Select a relation from search results.</div>';
          return;
        }
        els.detailBody.innerHTML = `
          <div class="kv"><div class="k">from</div><div>${escapeHtml(relation.from || "-")}</div></div>
          <div class="kv"><div class="k">type</div><div>${escapeHtml(relation.type || "-")}</div></div>
          <div class="kv"><div class="k">to</div><div>${escapeHtml(relation.to || "-")}</div></div>
          <div class="kv"><div class="k">weight</div><div>${relation.weight ?? "-"}</div></div>
        `;
      }

      async function loadDetailForName(name) {
        const cfg = modeConfig(state.mode);
        if (!cfg.detailPath || !name) return;
        try {
          const data = await requestJson(cfg.detailPath(name));
          if (state.mode === MODE_EPISODE) {
            renderEpisodeDetail(data);
          } else {
            renderConceptDetail(data);
          }
        } catch (error) {
          els.detailBody.innerHTML = `<div class="status-ng">Failed to load detail: ${escapeHtml(error.message || error)}</div>`;
        }
      }

      function renderTimeline(items) {
        if (!Array.isArray(items) || items.length === 0) {
          els.timeline.innerHTML = '<div class="timeline-item muted">No concept_graph.query events.</div>';
          return;
        }
        els.timeline.innerHTML = items
          .map((item) => {
            const terms = Array.isArray(item.query_terms) ? item.query_terms.join(", ") : "";
            const concepts = Array.isArray(item.result_concepts) ? item.result_concepts.join(", ") : "";
            const error = item.error ? `<div class="status-ng">error=${escapeHtml(item.error)}</div>` : "";
            return `
              <div class="timeline-item">
                <div class="timeline-meta">${escapeHtml(item.ts || "-")} · event_id=${escapeHtml(item.event_id || "-")}</div>
                <div>query_terms: ${escapeHtml(terms || "-")}</div>
                <div>result_concepts: ${escapeHtml(concepts || "-")}</div>
                ${error}
              </div>
            `;
          })
          .join("");
      }

      async function loadTimeline() {
        try {
          const data = await requestJson("/admin/concept-graph/queries?limit=120");
          renderTimeline(data.items || []);
        } catch (error) {
          els.timeline.innerHTML = `<div class="timeline-item status-ng">Failed to load timeline: ${escapeHtml(error.message || error)}</div>`;
        }
      }

      els.tabConcept.addEventListener("click", async () => {
        setMode(MODE_CONCEPT);
        await loadSearch();
      });
      els.tabEpisode.addEventListener("click", async () => {
        setMode(MODE_EPISODE);
        await loadSearch();
      });
      els.tabRelation.addEventListener("click", async () => {
        setMode(MODE_RELATION);
        await loadSearch();
      });

      els.searchBtn.addEventListener("click", async () => { await loadSearch(); });
      els.searchInput.addEventListener("keydown", async (event) => {
        if (event.key !== "Enter") return;
        await loadSearch();
      });

      els.searchList.addEventListener("click", async (event) => {
        const row = event.target.closest(".item[data-item-key]");
        if (!row) return;
        const key = row.getAttribute("data-item-key");
        if (!key) return;
        state.selectedKey = key;
        const rawJson = row.getAttribute("data-item-json") || "{}";
        let item = {};
        try { item = JSON.parse(rawJson); } catch (_) {}
        await loadSearch();

        if (state.mode === MODE_RELATION) {
          renderRelationDetail(item);
          return;
        }
        await loadDetailForName(item.name || "");
      });

      els.refreshTimelineBtn.addEventListener("click", loadTimeline);
      els.topLogoutButton.addEventListener("click", async () => {
        try {
          await fetch("/auth/logout", { method: "POST" });
        } finally {
          window.location.href = "/admin/login";
        }
      });

      async function init() {
        setMode(MODE_CONCEPT);
        await Promise.all([loadHealth(), loadCounts(), loadSearch(), loadTimeline()]);
        setInterval(loadHealth, 8000);
        setInterval(loadCounts, 12000);
        setInterval(loadTimeline, 5000);
      }

      init();
    </script>
  </body>
</html>
