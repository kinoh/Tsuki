<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Core Rust Debug UI</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #171a21;
        --panel-2: #1c2029;
        --text: #e8ecf2;
        --muted: #9aa4b2;
        --accent: #ff4fa7;
        --accent-2: #714af4;
        --danger: #d46b6b;
        --line: rgba(255, 255, 255, 0.08);
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", "IBM Plex Sans", "Avenir Next", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top left, #1c2029 0%, #0f1115 60%);
        min-height: 100vh;
      }

      header {
        padding: 20px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--line);
      }

      header h1 {
        font-size: 20px;
        margin: 0;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      header .status {
        font-size: 13px;
        color: var(--muted);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(220px, 18vw) minmax(0, 1fr) minmax(360px, 32vw);
        gap: 16px;
        padding: 20px 24px 32px;
      }

      .panel {
        background: var(--panel);
        border-radius: var(--radius);
        padding: 16px;
        box-shadow: var(--shadow);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .panel h2 {
        margin: 0 0 12px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
      }

      .worklog-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: 70vh;
        overflow: auto;
        position: relative;
        padding-top: 10px;
      }

      .worklog-item {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid transparent;
        background: var(--panel-2);
        cursor: pointer;
        transition: border 0.2s ease, transform 0.2s ease;
        position: relative;
      }

      .worklog-item:hover {
        border-color: rgba(255, 79, 167, 0.5);
        transform: translateY(-1px);
      }

      .worklog-item.active {
        border-color: var(--accent);
      }

      .worklog-meta {
        font-size: 11px;
        color: var(--muted);
      }

      .exclude-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(15, 17, 21, 0.8);
        color: var(--muted);
        font-size: 11px;
        line-height: 1;
        cursor: pointer;
      }

      .worklog-item.excluded {
        opacity: 0.45;
      }

      .worklog-item.cutoff-anchor {
        position: relative;
      }

      .worklog-item.cutoff-anchor::after {
        content: "";
        position: absolute;
        left: 8px;
        right: 8px;
        bottom: -6px;
        border-bottom: 2px solid rgba(113, 74, 244, 0.85);
      }

      .worklog-list.cutoff-at-top::before {
        content: "";
        position: absolute;
        left: 8px;
        right: 8px;
        top: 2px;
        border-top: 2px solid rgba(113, 74, 244, 0.85);
      }

      .flow {
        background: linear-gradient(145deg, rgba(23, 26, 33, 0.6), rgba(15, 17, 21, 0.6));
        border-radius: var(--radius);
        padding: 20px;
        min-height: 60vh;
        border: 1px solid var(--line);
        position: relative;
        overflow: hidden;
      }

      .flow-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        align-items: center;
      }

      .node {
        border-radius: 14px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        text-align: center;
        transition: transform 0.2s ease, border 0.2s ease, opacity 0.2s ease;
      }

      .node strong {
        display: block;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .node small {
        color: var(--muted);
      }

      .node.active {
        border-color: var(--accent);
        transform: translateY(-2px) scale(1.01);
        background: rgba(255, 79, 167, 0.14);
      }

      .node.dim {
        opacity: 0.35;
      }

      .flow-details {
        margin-top: 18px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .submodule-list {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: center;
      }

      .submodule-chip {
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(15, 17, 21, 0.8);
        font-size: 11px;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: transform 0.2s ease, border 0.2s ease;
      }

      .submodule-chip:hover {
        transform: translateY(-1px);
        border-color: rgba(85, 182, 210, 0.6);
      }

      .submodule-chip.active {
        border-color: var(--accent-2);
        background: rgba(113, 74, 244, 0.2);
        box-shadow: 0 0 0 1px rgba(113, 74, 244, 0.4);
      }

      .detail-card {
        background: var(--panel);
        border-radius: 14px;
        padding: 12px;
        border: 1px solid var(--line);
        min-height: 120px;
      }

      .detail-card h3 {
        margin: 0 0 8px;
        font-size: 12px;
        text-transform: uppercase;
        color: var(--muted);
        letter-spacing: 0.08em;
      }

      .detail-card pre {
        white-space: pre-wrap;
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 12px;
        color: var(--text);
      }

      .control-section {
        margin-bottom: 16px;
      }

      label {
        font-size: 12px;
        color: var(--muted);
        display: block;
        margin-bottom: 6px;
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 8px 0 4px;
        font-size: 12px;
        color: var(--muted);
      }

      .checkbox-row label {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      .checkbox-row input {
        width: auto;
      }

      .submodule-manage-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin: 8px 0 12px;
      }

      .submodule-manage-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(15, 17, 21, 0.7);
        font-size: 12px;
      }

      .submodule-manage-item button {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--text);
        padding: 6px 10px;
        border-radius: 8px;
        font-size: 11px;
      }

      select,
      textarea,
      input {
        width: 100%;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(15, 17, 21, 0.9);
        color: var(--text);
        padding: 10px;
        font-size: 13px;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      button {
        background: var(--accent);
        color: #1a1a1a;
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }

      button.secondary {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--text);
      }

      .button-row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .muted {
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 1440px) {
        .layout {
          grid-template-columns: minmax(200px, 24vw) minmax(0, 1fr) minmax(320px, 36vw);
        }
      }

      @media (max-width: 1200px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .flow-grid {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Core Rust Debug</h1>
      <div class="status" id="status">Idle</div>
    </header>

    <div class="layout">
      <aside class="panel">
        <h2>Work Log</h2>
        <div class="worklog-list" id="worklog"></div>
        <div class="button-row">
          <button class="secondary" id="refreshLog">Refresh</button>
          <button class="secondary" id="setCutoff">Set cutoff</button>
          <button class="secondary" id="clearCutoff">Clear cutoff</button>
        </div>
      </aside>

      <section class="flow">
        <div class="flow-grid" id="flowGrid">
          <div class="node" data-node="input">
            <strong>Input</strong>
            <small>User</small>
          </div>
          <div class="node" data-node="submodules">
            <strong>Submodules</strong>
            <small>Parallel</small>
            <div class="submodule-list" id="submoduleList"></div>
          </div>
          <div class="node" data-node="decision">
            <strong>Decision</strong>
            <small>Main</small>
          </div>
          <div class="node" data-node="reply">
            <strong>Reply</strong>
            <small>emit_user_reply</small>
          </div>
        </div>

        <div class="flow-details">
          <div class="detail-card">
            <h3>Input</h3>
            <pre id="inputText">No run selected.</pre>
          </div>
          <div class="detail-card">
            <h3>Output</h3>
            <pre id="outputText">Run a module to see output.</pre>
          </div>
        </div>

        <div class="detail-card" style="margin-top: 12px;">
          <h3>Raw Response</h3>
          <pre id="rawText">(none)</pre>
        </div>

      </section>

      <aside class="panel">
        <h2 id="moduleTitle">Module</h2>
        <div class="muted" id="moduleEmpty">Select a node in the flow.</div>

        <div class="control-section" id="inputSection" hidden>
          <label for="moduleInput">Input</label>
          <textarea id="moduleInput" placeholder="Type input for the selected module..."></textarea>
          <div class="button-row" id="runButtons">
            <button id="runModule">Run</button>
            <button class="secondary" id="loadRaw">Load Raw</button>
          </div>
          <div class="muted" id="runStatus"></div>
        </div>

        <div class="control-section" id="submoduleOutputsSection" hidden>
          <label for="submoduleOutputsInput">Submodule Outputs (optional)</label>
          <textarea
            id="submoduleOutputsInput"
            placeholder="curiosity: ...&#10;self_preservation: ...&#10;social_approval: ..."
          ></textarea>
          <div class="button-row">
            <button class="secondary" id="autofillSubmoduleOutputs">Auto-fill from logs</button>
          </div>
          <div class="muted" id="autofillStatus"></div>
          <div class="muted">Format: name: output (one per line)</div>
        </div>

        <div class="control-section" id="submoduleManageSection" hidden>
          <h2>Submodules</h2>
          <div class="submodule-manage-list" id="submoduleManageList"></div>
          <label for="newSubmoduleName">New Submodule</label>
          <input id="newSubmoduleName" placeholder="module_name" />
          <label for="newSubmodulePrompt">Instructions</label>
          <textarea id="newSubmodulePrompt"></textarea>
          <div class="button-row">
            <button id="addSubmodule">Add</button>
          </div>
          <div class="muted" id="submoduleManageStatus"></div>
        </div>

        <div class="control-section" id="modulePromptSection" hidden>
          <label for="moduleBasePrompt">Base Prompt</label>
          <textarea id="moduleBasePrompt"></textarea>
          <label for="modulePrompt" id="modulePromptLabel">Prompt</label>
          <textarea id="modulePrompt"></textarea>
          <div class="button-row">
            <button id="savePrompts">Save</button>
          </div>
          <div class="muted" id="promptStatus"></div>
        </div>
      </aside>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const worklogEl = document.getElementById("worklog");
      const inputTextEl = document.getElementById("inputText");
      const outputTextEl = document.getElementById("outputText");
      const rawTextEl = document.getElementById("rawText");
      const moduleInput = document.getElementById("moduleInput");
      const submoduleListEl = document.getElementById("submoduleList");
      const moduleTitleEl = document.getElementById("moduleTitle");
      const moduleEmptyEl = document.getElementById("moduleEmpty");
      const inputSection = document.getElementById("inputSection");
      const runButtons = document.getElementById("runButtons");
      const submoduleOutputsSection = document.getElementById("submoduleOutputsSection");
      const submoduleOutputsInput = document.getElementById("submoduleOutputsInput");
      const autofillSubmoduleOutputsButton = document.getElementById("autofillSubmoduleOutputs");
      const autofillStatus = document.getElementById("autofillStatus");
      const submoduleManageSection = document.getElementById("submoduleManageSection");
      const submoduleManageList = document.getElementById("submoduleManageList");
      const newSubmoduleName = document.getElementById("newSubmoduleName");
      const newSubmodulePrompt = document.getElementById("newSubmodulePrompt");
      const addSubmoduleButton = document.getElementById("addSubmodule");
      const submoduleManageStatus = document.getElementById("submoduleManageStatus");
      const modulePromptSection = document.getElementById("modulePromptSection");
      const runStatus = document.getElementById("runStatus");
      const modulePrompt = document.getElementById("modulePrompt");
      const modulePromptLabel = document.getElementById("modulePromptLabel");
      const moduleBasePrompt = document.getElementById("moduleBasePrompt");
      const promptStatus = document.getElementById("promptStatus");
      const flowNodes = Array.from(document.querySelectorAll(".node"));

      const state = {
        prompts: null,
        submodules: new Map(),
        basePrompt: "",
        decisionPrompt: "",
        submoduleOutputsRaw: "",
        historyCutoffTs: null,
        selectedWorklogTs: null,
        excludedEventIds: new Set(),
        selectedModule: null,
        selectedKind: null,
        lastInput: "",
        lastOutput: "",
        worklogs: [],
      };

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function setFlowHighlight(selection) {
        flowNodes.forEach((node) => {
          node.classList.remove("active");
          node.classList.remove("dim");
        });
        document.querySelectorAll(".submodule-chip").forEach((chip) => {
          chip.classList.remove("active");
        });
        if (!selection) {
          return;
        }
        const activate = (name) => {
          flowNodes
            .filter((node) => node.dataset.node === name)
            .forEach((node) => node.classList.add("active"));
        };
        const dimOthers = (activeNames) => {
          flowNodes.forEach((node) => {
            if (!activeNames.includes(node.dataset.node)) {
              node.classList.add("dim");
            }
          });
        };
        if (selection.kind === "submodule") {
          activate("input");
          activate("submodules");
          dimOthers(["input", "submodules"]);
          const chip = Array.from(document.querySelectorAll(".submodule-chip")).find(
            (item) => item.textContent === selection.name,
          );
          if (chip) {
            chip.classList.add("active");
          }
        } else if (selection.kind === "decision") {
          activate("input");
          activate("decision");
          dimOthers(["input", "decision"]);
        } else if (selection.kind === "input") {
          activate("input");
          dimOthers(["input"]);
        } else if (selection.kind === "reply") {
          activate("reply");
          dimOthers(["reply"]);
        } else if (selection.kind === "submodules") {
          activate("submodules");
          dimOthers(["submodules"]);
        }
      }

      function formatTime(iso) {
        if (!iso) return "";
        const date = new Date(iso);
        return date.toLocaleTimeString();
      }

      function getCurrentHistoryCutoffTs() {
        return state.historyCutoffTs;
      }

      function normalizeInputText(value) {
        return (value || "").trim();
      }

      async function fetchPrompts() {
        setStatus("Loading prompts...");
        const res = await fetch("/debug/prompts");
        if (!res.ok) {
          setStatus("Failed to load prompts");
          return;
        }
        const data = await res.json();
        state.prompts = data;
        state.submodules = new Map(data.submodules.map((item) => [item.name, item.instructions]));
        state.basePrompt = data.base || "";
        state.decisionPrompt = data.decision || "";
        const template = buildSubmoduleOutputTemplate();
        if (!state.submoduleOutputsRaw || state.submoduleOutputsRaw.trim() === "") {
          state.submoduleOutputsRaw = template;
        }
        renderSubmoduleList();
        renderSubmoduleManageList();
        setStatus("Ready");
      }

      function buildSubmoduleOutputTemplate() {
        return Array.from(state.submodules.keys())
          .map((name) => `${name}: `)
          .join("\n");
      }

      function renderSubmoduleList() {
        submoduleListEl.innerHTML = "";
        const names = Array.from(state.submodules.keys());
        names.forEach((name) => {
          const chip = document.createElement("div");
          chip.className = "submodule-chip";
          chip.textContent = name;
          chip.addEventListener("click", (event) => {
            event.stopPropagation();
            selectModule(name, "submodule");
          });
          submoduleListEl.appendChild(chip);
        });
      }

      function renderSubmoduleManageList() {
        submoduleManageList.innerHTML = "";
        const names = Array.from(state.submodules.keys());
        if (names.length === 0) {
          submoduleManageList.innerHTML = '<div class="muted">No submodules.</div>';
          return;
        }
        names.forEach((name) => {
          const item = document.createElement("div");
          item.className = "submodule-manage-item";
          item.innerHTML = `<span>${name}</span>`;
          const remove = document.createElement("button");
          remove.textContent = "Remove";
          remove.addEventListener("click", () => removeSubmodule(name));
          item.appendChild(remove);
          submoduleManageList.appendChild(item);
        });
      }

      function removeSubmodule(name) {
        state.submodules.delete(name);
        renderSubmoduleList();
        renderSubmoduleManageList();
        const template = buildSubmoduleOutputTemplate();
        if (!state.submoduleOutputsRaw || state.submoduleOutputsRaw.trim() === "") {
          state.submoduleOutputsRaw = template;
        }
        if (state.selectedModule === name) {
          applySelection({ kind: "submodules", name: null });
        }
      }

      function selectNode(nodeName) {
        if (nodeName === "input") {
          applySelection({ kind: "input", name: null });
        } else if (nodeName === "decision") {
          selectModule("decision", "decision");
        } else if (nodeName === "reply") {
          applySelection({ kind: "reply", name: null });
        } else if (nodeName === "submodules") {
          applySelection({ kind: "submodules", name: null });
        }
      }

      function selectModule(name, kind) {
        applySelection({ kind, name });
      }

      function applySelection(selection) {
        state.selectedKind = selection.kind;
        state.selectedModule = selection.name || null;
        setFlowHighlight(selection);
        moduleEmptyEl.hidden = true;
        moduleTitleEl.textContent = selection.name
          ? `Module: ${selection.name}`
          : `Module: ${selection.kind}`;
        inputSection.hidden = true;
        runButtons.hidden = true;
        submoduleOutputsSection.hidden = true;
        submoduleManageSection.hidden = true;
        modulePromptSection.hidden = true;
        if (selection.kind === "submodule") {
          inputSection.hidden = false;
          runButtons.hidden = false;
          modulePromptSection.hidden = false;
          modulePromptLabel.textContent = "Submodule Prompt";
          moduleBasePrompt.value = state.basePrompt;
          modulePrompt.value = state.submodules.get(selection.name) || "";
        } else if (selection.kind === "decision") {
          inputSection.hidden = false;
          runButtons.hidden = false;
          submoduleOutputsSection.hidden = false;
          modulePromptSection.hidden = false;
          modulePromptLabel.textContent = "Decision Prompt";
          moduleBasePrompt.value = state.basePrompt;
          modulePrompt.value = state.decisionPrompt;
          const template = buildSubmoduleOutputTemplate();
          if (!state.submoduleOutputsRaw || state.submoduleOutputsRaw.trim() === "") {
            state.submoduleOutputsRaw = template;
          }
          submoduleOutputsInput.value = state.submoduleOutputsRaw;
        } else if (selection.kind === "input") {
          inputSection.hidden = false;
          modulePromptSection.hidden = true;
          runButtons.hidden = true;
        } else if (selection.kind === "reply") {
          modulePromptSection.hidden = true;
          inputSection.hidden = true;
          moduleEmptyEl.textContent = "Reply has no prompt.";
          moduleEmptyEl.hidden = false;
        } else if (selection.kind === "submodules") {
          submoduleManageSection.hidden = false;
          moduleEmptyEl.hidden = true;
        } else {
          moduleEmptyEl.textContent = "Select a submodule to inspect.";
          moduleEmptyEl.hidden = false;
        }
        runStatus.textContent = "";
        promptStatus.textContent = "";
        autofillStatus.textContent = "";
        if (!inputSection.hidden && !moduleInput.value.trim() && state.lastInput) {
          moduleInput.value = state.lastInput;
        }
      }

      async function fetchWorklogs() {
        const [worklogRes, replyRes] = await Promise.all([
          fetch("/debug/events?tag=debug,worklog&limit=200"),
          fetch("/debug/events?tag=action,response&limit=200"),
        ]);
        if (!worklogRes.ok || !replyRes.ok) {
          worklogEl.innerHTML = '<div class="muted">Failed to load work log.</div>';
          return;
        }
        const [worklogData, replyData] = await Promise.all([worklogRes.json(), replyRes.json()]);
        const merged = [...(worklogData.events || []), ...(replyData.events || [])];
        state.worklogs = merged.sort((a, b) => {
          const at = Date.parse(a.ts || "") || 0;
          const bt = Date.parse(b.ts || "") || 0;
          return bt - at;
        });
        const liveIds = new Set(state.worklogs.map((event) => event.event_id));
        state.excludedEventIds.forEach((id) => {
          if (!liveIds.has(id)) {
            state.excludedEventIds.delete(id);
          }
        });
        if (state.historyCutoffTs) {
          const exists = state.worklogs.some((event) => event.ts === state.historyCutoffTs);
          if (!exists) {
            state.historyCutoffTs = null;
          }
        }
        if (state.selectedWorklogTs) {
          const exists = state.worklogs.some((event) => event.ts === state.selectedWorklogTs);
          if (!exists) {
            state.selectedWorklogTs = null;
          }
        }
        renderWorklogs();
      }

      function getEventTags(event) {
        return (event.meta && event.meta.tags) || [];
      }

      function isReplyEvent(event) {
        const tags = getEventTags(event);
        return tags.includes("action") && tags.includes("response");
      }

      function extractTagValue(tags, prefix) {
        const match = tags.find((tag) => tag.startsWith(prefix));
        return match ? match.slice(prefix.length) : "";
      }

      function eventTimestamp(event) {
        if (!event.ts) return 0;
        const value = Date.parse(event.ts);
        return Number.isNaN(value) ? 0 : value;
      }

      async function updateRawFromWorklog(event, moduleName, mode) {
        rawTextEl.textContent = "(loading...)";
        const res = await fetch("/debug/events?tag=debug,llm.raw&limit=200");
        if (!res.ok) {
          rawTextEl.textContent = "(none)";
          return;
        }
        const data = await res.json();
        const candidates = (data.events || []).filter((rawEvent) => {
          const tags = getEventTags(rawEvent);
          if (!tags.includes(`module:${moduleName}`)) return false;
          const rawMode = extractTagValue(tags, "mode:");
          if (mode && rawMode && rawMode !== mode) return false;
          return true;
        });
        if (candidates.length === 0) {
          rawTextEl.textContent = "(none)";
          return;
        }
        const targetTs = eventTimestamp(event);
        let best = candidates[0];
        let bestDelta = Math.abs(eventTimestamp(best) - targetTs);
        candidates.forEach((candidate) => {
          const delta = Math.abs(eventTimestamp(candidate) - targetTs);
          if (delta < bestDelta) {
            best = candidate;
            bestDelta = delta;
          }
        });
        rawTextEl.textContent = JSON.stringify(best.payload.raw, null, 2);
      }

      function renderWorklogs() {
        worklogEl.innerHTML = "";
        worklogEl.classList.toggle("cutoff-at-top", !state.historyCutoffTs);
        if (state.worklogs.length === 0) {
          worklogEl.innerHTML = '<div class="muted">No work log entries yet.</div>';
          return;
        }
        state.worklogs.forEach((event) => {
          const payload = event.payload || {};
          const reply = isReplyEvent(event);
          const moduleName = reply ? "reply" : payload.module || "module";
          const mode = reply ? "-" : payload.mode || "full";
          const kind = reply ? "reply" : "worklog";
          const excluded = state.excludedEventIds.has(event.event_id);
          const item = document.createElement("div");
          item.className = "worklog-item";
          if (excluded) {
            item.classList.add("excluded");
          }
          if (event.ts && event.ts === state.selectedWorklogTs) {
            item.classList.add("active");
          }
          if (event.ts && event.ts === state.historyCutoffTs) {
            item.classList.add("cutoff-anchor");
          }
          item.innerHTML = `
            <div><strong>${moduleName}</strong></div>
            <div class="worklog-meta">${kind} · ${mode} · ${formatTime(event.ts)}</div>
            <button class="exclude-btn" type="button" title="Exclude from history">&times;</button>
          `;
          item.querySelector(".exclude-btn").addEventListener("click", (clickEvent) => {
            clickEvent.stopPropagation();
            if (state.excludedEventIds.has(event.event_id)) {
              state.excludedEventIds.delete(event.event_id);
            } else {
              state.excludedEventIds.add(event.event_id);
            }
            renderWorklogs();
          });
          item.addEventListener("click", () => {
            state.selectedWorklogTs = event.ts || null;
            renderWorklogs();
            const output = payload.output || payload.text || "";
            const input = payload.input || "";
            inputTextEl.textContent = input;
            outputTextEl.textContent = output;
            state.lastInput = input;
            state.lastOutput = output;
            moduleInput.value = state.lastInput;
            if (reply) {
              selectNode("reply");
              rawTextEl.textContent = "(none)";
              return;
            }
            if (moduleName) {
              const kind = moduleName === "decision" ? "decision" : "submodule";
              selectModule(moduleName, kind);
            }
            updateRawFromWorklog(event, moduleName, mode);
          });
          worklogEl.appendChild(item);
        });
      }

      async function runModule() {
        const moduleName = state.selectedModule;
        if (!moduleName || !["submodule", "decision"].includes(state.selectedKind)) {
          runStatus.textContent = "Select a runnable module.";
          return;
        }
        const input = moduleInput.value.trim();
        if (!input) {
          runStatus.textContent = "Input is required.";
          return;
        }
        runStatus.textContent = "Running...";
        const payload = { input };
        if (state.selectedKind === "decision") {
          payload.submodule_outputs = state.submoduleOutputsRaw || "";
        }
        payload.exclude_event_ids = Array.from(state.excludedEventIds);
        const cutoffTs = getCurrentHistoryCutoffTs();
        payload.include_history = Boolean(cutoffTs);
        if (cutoffTs) {
          payload.history_cutoff_ts = cutoffTs;
        }
        const res = await fetch(`/debug/modules/${encodeURIComponent(moduleName)}/run`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res.ok) {
          runStatus.textContent = "Run failed.";
          return;
        }
        const data = await res.json();
        inputTextEl.textContent = input;
        outputTextEl.textContent = data.output || "";
        rawTextEl.textContent = "(none)";
        state.lastInput = input;
        state.lastOutput = data.output || "";
        setFlowHighlight({ kind: state.selectedKind, name: moduleName });
        runStatus.textContent = "Done.";
        await fetchWorklogs();
      }

      async function loadRaw() {
        const moduleName = state.selectedModule;
        if (!moduleName || !["submodule", "decision"].includes(state.selectedKind)) {
          runStatus.textContent = "Select a runnable module.";
          return;
        }
        const res = await fetch(`/debug/events?tag=debug,llm.raw&limit=20`);
        if (!res.ok) {
          runStatus.textContent = "Failed to load raw.";
          return;
        }
        const data = await res.json();
        const events = (data.events || []).filter((event) => {
          const tags = (event.meta && event.meta.tags) || [];
          return tags.includes(`module:${moduleName}`);
        });
        events.sort((a, b) => {
          const at = Date.parse(a.ts || "") || 0;
          const bt = Date.parse(b.ts || "") || 0;
          return bt - at;
        });
        const latest = events[0];
        if (!latest) {
          runStatus.textContent = "No raw payload found.";
          return;
        }
        rawTextEl.textContent = JSON.stringify(latest.payload.raw, null, 2);
      }

      async function autofillSubmoduleOutputsFromLogs() {
        const input = normalizeInputText(moduleInput.value);
        if (!input) {
          autofillStatus.textContent = "Input is required.";
          return;
        }
        autofillStatus.textContent = "Loading...";
        const res = await fetch("/debug/events?tag=debug,worklog&limit=500");
        if (!res.ok) {
          autofillStatus.textContent = "Failed to load logs.";
          return;
        }
        const data = await res.json();
        const events = (data.events || []).sort((a, b) => {
          const at = Date.parse(a.ts || "") || 0;
          const bt = Date.parse(b.ts || "") || 0;
          return bt - at;
        });
        const matched = new Map();
        const matchedTimes = [];
        const submoduleNames = Array.from(state.submodules.keys());
        events.forEach((event) => {
          const payload = event.payload || {};
          if (payload.mode !== "module_only") return;
          const moduleName = payload.module || "";
          if (!state.submodules.has(moduleName)) return;
          if (matched.has(moduleName)) return;
          if (normalizeInputText(payload.input) !== input) return;
          matched.set(moduleName, payload.output || "");
          if (event.ts) {
            matchedTimes.push(event.ts);
          }
        });
        if (matched.size === 0) {
          autofillStatus.textContent = "No matching submodule outputs found.";
          return;
        }
        const lines = submoduleNames.map((name) => `${name}: ${matched.get(name) || ""}`);
        state.submoduleOutputsRaw = lines.join("\n");
        submoduleOutputsInput.value = state.submoduleOutputsRaw;
        const latestTs = matchedTimes
          .map((ts) => Date.parse(ts))
          .filter((ts) => !Number.isNaN(ts))
          .sort((a, b) => b - a)[0];
        const latestLabel = latestTs ? new Date(latestTs).toLocaleTimeString() : "unknown time";
        autofillStatus.textContent = `Filled ${matched.size}/${submoduleNames.length} modules from ${latestLabel}.`;
      }

      async function savePrompts() {
        promptStatus.textContent = "Saving...";
        submoduleManageStatus.textContent = "";
        const submodules = Array.from(state.submodules.entries()).map(([name, instructions]) => ({
          name,
          instructions,
        }));
        const payload = {
          base: state.basePrompt,
          decision: state.decisionPrompt,
          submodules,
        };
        const res = await fetch("/debug/prompts", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res.ok) {
          promptStatus.textContent = "Save failed.";
          return;
        }
        promptStatus.textContent = "Saved.";
      }

      moduleBasePrompt.addEventListener("input", () => {
        state.basePrompt = moduleBasePrompt.value;
      });

      submoduleOutputsInput.addEventListener("input", () => {
        state.submoduleOutputsRaw = submoduleOutputsInput.value;
      });

      modulePrompt.addEventListener("input", () => {
        const name = state.selectedModule;
        if (!name) return;
        if (state.selectedKind === "decision") {
          state.decisionPrompt = modulePrompt.value;
        } else if (state.selectedKind === "submodule") {
          state.submodules.set(name, modulePrompt.value);
        }
      });

      addSubmoduleButton.addEventListener("click", () => {
        const name = newSubmoduleName.value.trim();
        const instructions = newSubmodulePrompt.value.trim();
        if (!name) {
          submoduleManageStatus.textContent = "Name is required.";
          return;
        }
        if (state.submodules.has(name)) {
          submoduleManageStatus.textContent = "Module already exists.";
          return;
        }
        state.submodules.set(name, instructions);
        newSubmoduleName.value = "";
        newSubmodulePrompt.value = "";
        submoduleManageStatus.textContent = "Added.";
        state.submoduleOutputsRaw = buildSubmoduleOutputTemplate();
        renderSubmoduleList();
        renderSubmoduleManageList();
      });

      document.getElementById("runModule").addEventListener("click", runModule);
      document.getElementById("loadRaw").addEventListener("click", loadRaw);
      document.getElementById("savePrompts").addEventListener("click", savePrompts);
      document.getElementById("refreshLog").addEventListener("click", fetchWorklogs);
      document.getElementById("setCutoff").addEventListener("click", () => {
        state.historyCutoffTs = state.selectedWorklogTs || null;
        renderWorklogs();
      });
      document.getElementById("clearCutoff").addEventListener("click", () => {
        state.historyCutoffTs = null;
        renderWorklogs();
      });
      autofillSubmoduleOutputsButton.addEventListener("click", autofillSubmoduleOutputsFromLogs);
      flowNodes.forEach((node) => {
        node.addEventListener("click", () => selectNode(node.dataset.node));
      });

      fetchPrompts();
      fetchWorklogs();
      setFlowHighlight(null);
      moduleEmptyEl.hidden = false;
      inputSection.hidden = true;
      submoduleOutputsSection.hidden = true;
      submoduleManageSection.hidden = true;
      modulePromptSection.hidden = true;
    </script>
  </body>
</html>
