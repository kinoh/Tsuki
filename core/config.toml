[server]
port = 2953

[llm]
model = "gpt-5.4-mini"
router_model = "gpt-5-nano"
temperature = 0.7
temperature_enabled = false
max_output_tokens = 10000
max_tool_rounds = 3

[limits]
decision_history = 30
submodule_history = 10

[router]
query_terms_max = 16
active_state_limit = 16
hard_trigger_threshold = 0.85
recommendation_threshold = 0.2

[router.multimodal_embedding]
enabled = true
shadow_enabled = true
primary_source = "multimodal"
model = "gemini-embedding-2-preview"
output_dimensionality = 512

[conversation_recall]
enabled = true
top_k_hits = 5
surrounding_event_window = 5
semantic_weight = 0.85
recency_weight = 0.15
recency_tau_ms = 2592000000

[db]
path = "./data/core-rust.db"
# remote_url = "libsql://..."

[prompts]
path = "./data/prompts.md"

[internal_prompts]
decision_context_template = """<recent_event_history>
{{recent_event_history}}
</recent_event_history>

<supplemental_context>
<latest_user_input>
{{latest_user_input}}
</latest_user_input>

<outputs_from_immediately_executed_submodules>
{{outputs_from_immediately_executed_submodules}}
</outputs_from_immediately_executed_submodules>

<active_concepts_and_arousal>
{{active_concepts_and_arousal}}
</active_concepts_and_arousal>

<candidate_submodules_by_interest_match>
{{candidate_submodules_by_interest_match}}
</candidate_submodules_by_interest_match>

<recalled_event_history>
Use this only when it is consistent with recent_event_history.
{{recalled_event_history}}
</recalled_event_history>

<visible_mcp_tool_contracts>
{{visible_mcp_tool_contracts}}
</visible_mcp_tool_contracts>

<visible_skills>
{{visible_skills}}
</visible_skills>
</supplemental_context>

<output_contract>
Return exactly one line:
decision=<respond|ignore> reason=<short>
</output_contract>."""

submodule_context_template = """Latest user input: {{latest_user_input}}
Active concepts and arousal:
{{active_concepts_and_arousal}}
Submodule recommendations:
{{candidate_submodules_by_interest_match}}
Recent events:
{{recent_event_history}}
Execution reason: {{execution_reason}}"""

mcp_trigger_extract_instructions = "Extract trigger concepts for MCP tools. Return strict JSON only."

mcp_trigger_extract_prompt_template = """Extract trigger concepts for an MCP tool.
Return strict JSON only with this shape: {"trigger_concepts": ["..."]}.
No markdown. No explanation.
Use natural language concepts directly (no prefixes).
Return at most {{max_trigger_concepts}} trigger concepts.
Prefer precision over recall.
Choose generic action concepts that describe the tool category a user is explicitly asking for.
Prefer stable action-family concepts over downstream use cases.
Avoid concrete subcommands, protocols, domains, file formats, or task examples such as curl, jq, RSS, JSON, XML, URL, download, or news fetch.
Avoid near-duplicates and paraphrase lists.
If fewer than {{max_trigger_concepts}} concepts are justified, return fewer.

server_id: {{server_id}}
tool_name: {{tool_name}}
description: {{description}}
input_schema_json: {{input_schema_json}}"""

mcp_trigger_extract_retry_prompt_template = """{{base_prompt}}

IMPORTANT: Output exactly one JSON object. Example:
{"trigger_concepts":["run a command","use the shell","execute a terminal command"]}"""

skill_index_instructions = "Generate skill index metadata. Return strict JSON only."

skill_index_prompt_template = """Create abstract index metadata for a skill body.
Return strict JSON only with this shape:
{"summary":"...","trigger_concepts":["..."]}
Rules:
- summary must be short and abstract
- summary must not encode concrete situations or step-by-step instructions
- trigger_concepts must contain at most {{max_trigger_concepts}} concise natural-language concepts
- trigger_concepts should help retrieve this skill from related user intents
- no markdown
- no explanation

skill_key: {{skill_key}}
body:
{{skill_body}}"""

decision_repair_instructions_template = """Decision contract repair:
You already decided to respond but failed to call emit_user_reply.
You must call emit_user_reply exactly once using the available tool.
Do not call any other tool.
After the tool call, output exactly one line: decision=respond reason=contract_repair."""

decision_repair_context_template = """{{original_context}}

tool_call_results_from_previous_attempt:
{{tool_call_results}}

Repair requirement:
Call emit_user_reply now using the gathered tool results."""

concept_link_selection_instructions = "You are a strict JSON selector for concept-graph curation tasks."

concept_link_selection_prompt_template = """Target submodule: {{submodule}}
Submodule instructions:
{{instructions}}

Candidate concepts (existing concept graph nodes):
{{concept_lines}}

Task:
- Select concept names that should trigger this submodule.
- Keep precision high and avoid broad or generic concepts.
- Select at most {{max_selected}} concepts.
- Return JSON only:
{"selected":["concept1","concept2"]}"""

[concept_graph]
memgraph_uri = "bolt://localhost:7687"
memgraph_user = ""
arousal_tau_ms = 86400000

[tts]
ja_accent_url = "http://localhost:2954"
voicevox_url = "http://localhost:50021"
voicevox_speaker = 10
voicevox_timeout_ms = 10000

[mcp_servers.shell_exec]
url = "http://localhost:8000/mcp"

[scheduler]
enabled = true
tick_interval_ms = 1000

[scheduler.self_improvement]
enabled = true
timezone = "Asia/Tokyo"
recurrence = { kind = "daily", at = "04:00:00" }
action = { kind = "emit_event", event = "self_improvement.run", payload = { target = "all", reason = "scheduled_daily" } }
