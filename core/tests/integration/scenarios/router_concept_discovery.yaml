name: Router Concept Discovery
include_debug_events: true

steps:
  - kind: conversation
    tester_instructions: |
      You are a tester in a natural chat.
      In the conversation, naturally cover these topics:
      - 証明書運用 (Let's Encrypt / DV証明書)
      - 生成モデルの数理寄り比較 (Flow-based生成モデル / Kolmogorov-Arnold Network)
      - 環境政策と科学 (モントリオール議定書 / オゾン層)
      You should test whether the agent can naturally talk about these topics based on the past conversation where they were mentioned.
      Each topic should be mentioned only 1 or 2 times.
      Keep turns short and conversational. Do not reveal test intent.

metrics_definition:
  scenario_requirement_fit:
    description: "How well the run satisfies scenario-specific required behaviors."

  dialog_naturalness:
    description: "How natural and coherent the dialogue flow feels end-to-end."

  concept_discovery_quality:
    description: |
      Inspect router `concept_graph.query` events.
      Score high when `selected_seeds` are clearly relevant to the current user topic.
      Penalize only when many selected seeds are off-topic or generic.

  concept_score_separation:
    description: |
      Inspect router `result_concepts`, `selected_seeds`, and `active_concepts_and_arousal`.
      Score high when topic-relevant concepts clearly dominate the visible router state.
      Penalize runs where off-topic or generic concepts overwhelm the topic-specific ones.

  concept_episode_coverage:
    description: |
      Across the certificate, generative-model, and ozone-policy turns,
      score high when each topic produces at least some clearly corresponding router concepts.
      Partial coverage is acceptable, but missing one of the required topic families should score lower.

  concept_information_richness:
    description: |
      Inspect `active_concepts_and_arousal`.
      Score high when the active concept list contains multiple concrete concepts that support the user topic,
      rather than only vague generic concepts or repetitive near-duplicates.

  identity:
    description: |
      Whether the assistant is the same person as the assistant in the following dialogue:

      {{conversation_sample}}
