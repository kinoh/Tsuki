name: tsuki

services:
  # Rust-based backend (primary runtime)
  core:
    image: tsuki-core:${GIT_HASH}
    build:
      context: .
      dockerfile: docker/core-rust/Dockerfile
      target: runtime
      args:
        GIT_HASH: ${GIT_HASH}
    environment:
      WEB_AUTH_TOKEN: ${WEB_AUTH_TOKEN}
      ADMIN_AUTH_PASSWORD: ${ADMIN_AUTH_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GCP_SERVICE_ACCOUNT_KEY: ${GCP_SERVICE_ACCOUNT_KEY}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID}
      DATA_DIR: /data
      MEMGRAPH_URI: bolt://memgraph:7687
      GIT_HASH: ${GIT_HASH}
    volumes:
      - core-data:/data
    ports:
      - "2953:2953"
    depends_on:
      - memgraph
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header=\"authorization: health:${WEB_AUTH_TOKEN}\" http://127.0.0.1:2953/metadata >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  memgraph-init:
    image: alpine:3.23
    command: sh -c "mkdir -p /data && chown -R 101:103 /data"
    volumes:
      - memgraph-data:/data
    restart: "no"

  memgraph:
    image: memgraph/memgraph
    command: ["--data-directory=/data"]
    volumes:
      # NOTE: Ensure /data is owned by uid 101 gid 103 (memgraph user).
      - memgraph-data:/data
    ports:
      - "7687:7687"
    depends_on:
      memgraph-init:
        condition: service_completed_successfully
    restart: always

  memgraph-lab:
    image: memgraph/lab
    environment:
      QUICK_CONNECT_MG_HOST: memgraph
      QUICK_CONNECT_MG_PORT: 7687
    ports:
      - "3000:3000"
    depends_on:
      - memgraph
    restart: always
    profiles:
      - management

  sandbox:
    build:
      context: .
      dockerfile: docker/sandbox/Dockerfile
    environment:
      MCP_EXEC_MAX_OUTPUT_BYTES: "1000"
      MCP_HTTP_BIND: "0.0.0.0:8000"
      MCP_HTTP_PATH: "/mcp"
    volumes:
      - sandbox-data:/memory
    ports:
      - "8000:8000"
    restart: always
    runtime: runsc
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "512M"

  voicevox-engine:
    image: voicevox/voicevox_engine:cpu-0.25.0
    ports:
      - "50021:50021"

  ja-accent:
    build:
      context: ./docker/ja-accent
      dockerfile: Dockerfile
    ports:
      - "2954:2954"

volumes:
  core-data:
  memgraph-data:
  sandbox-data:
